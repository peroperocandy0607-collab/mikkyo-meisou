<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="密教梵輪 app icon">
  <rect width="512" height="512" fill="#fff"/>
  <rect x="22" y="22" width="468" height="468" rx="112" fill="none" stroke="#d7d7d7" stroke-width="3"/>
  <rect x="28" y="28" width="456" height="456" rx="106" fill="none" stroke="#eeeeee" stroke-width="2"/>
  <defs>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c7d2fe" stop-opacity="0.55"/>
      <stop offset="0.58" stop-color="#e0e7ff" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#eef2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glyphGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="157" r="86" fill="url(#moonGlow)"/>
  <circle cx="256" cy="157" r="72" fill="none" stroke="#4338ca" stroke-opacity="0.18" stroke-width="2"/>
  <text x="256" y="188" text-anchor="middle" fill="#3730a3" filter="url(#glyphGlow)"
        font-family="Noto Sans Siddham, serif" font-size="92">&#x11580;</text>
  <text x="256" y="306" text-anchor="middle" fill="#292524" font-family="Yu Gothic,Meiryo,sans-serif" font-size="51" font-weight="600" letter-spacing="8">密教梵輪</text>
  <text x="256" y="366" text-anchor="middle" fill="#4338ca" font-family="Cinzel,Segoe UI,serif" font-size="27" font-weight="600" letter-spacing="8">BONRIN</text>
</svg>
